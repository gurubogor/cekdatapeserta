<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Peserta Lomba - Kecamatan Sukamakmur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: {
                            dark: '#c2410c', primary: '#f97316', secondary: '#fb923c',
                            accent: '#ffedd5', light: '#fff7ed'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        /* Animasi loading sederhana */
        .loader {
          border: 4px solid #f3f3f3;
          border-top: 4px solid #f97316;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col" onload="initApp()">

    <div id="main-container" class="flex-grow flex flex-col items-center justify-center p-4">
        
        <div id="loading-state" class="text-center py-10 flex flex-col items-center justify-center w-full">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Sedang memuat data peserta...</p>
        </div>

        <div id="error-state" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg border border-red-100 p-8 text-center mx-auto">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Data Tidak Ditemukan</h2>
            <p id="error-message" class="text-gray-600 mb-6 text-sm"></p>
            <a href="cek-peserta.html" class="inline-block bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-md">
                <i class="fas fa-search mr-2"></i> Coba Cari Lagi
            </a>
        </div>

        <div id="search-state" class="hidden w-full max-w-lg bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-orange-100 relative overflow-hidden mt-10">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-orange-400 z-20"></div>
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl mb-4">
                    <i class="fas fa-id-card-alt text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Cari Peserta</h2>
                <p class="text-gray-500 mt-1 text-sm">Masukkan 5 Digit ID Peserta.</p>
            </div>
            <div class="flex space-x-2">
                <input type="text" id="input-cek-id" maxlength="5" style="text-transform: uppercase;" class="flex-grow w-full appearance-none rounded-xl border-2 border-gray-200 px-4 py-3 text-lg tracking-widest font-mono text-center text-gray-900 focus:outline-none focus:ring-0 focus:border-orange-500 bg-gray-50" placeholder="A001">
                <button onclick="cariPesertaManual()" class="bg-gradient-to-r from-orange-500 to-orange-400 text-white font-bold px-6 rounded-xl shadow-md hover:opacity-90">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div id="card-container" class="hidden w-full max-w-md mx-auto my-4 transition-all duration-300">
            </div>
        
        <div id="card-actions" class="hidden w-full max-w-md mx-auto mt-4 mb-8 space-y-3 px-2">
            <button onclick="window.print()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900 transition flex justify-center items-center shadow-md">
                <i class="fas fa-print mr-2"></i> Cetak / Simpan PDF
            </button>
            <a href="https://gurubogor.github.io/lombasukamakmur/" class="w-full bg-white border border-gray-300 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-50 transition flex justify-center items-center shadow-sm block text-center">
                <i class="fas fa-home mr-2"></i> Kembali ke Beranda Utama
            </a>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgiaujeKcPpf2HQWHKZcICxsrFAlIvdgV4hq6EuGEIY40IaX14wu80BwftWIrr38YY/exec";

        let DATA_REGISTRATIONS = [];
        let globalModalTimer;
        let html5QrCode; // Instance untuk scanner QR

        // Fungsi inisialisasi awal saat load
        async function initApp() {
            showModal('Sedang Memuat', 'Menarik data pendaftaran dari server...', 'info', true, 0);
            
            // Tambahkan listener untuk input enter
            document.getElementById('input-cek-id').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    cariPesertaManual();
                }
            });

            await fetchDatabase();
            
            // Cek URL Param setelah database selesai di-fetch
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');
            
            if (idFromUrl) {
                document.getElementById('input-cek-id').value = idFromUrl;
                // Langsung ubah halaman jadi kartu peserta
                tampilkanKartuKeHalaman(idFromUrl);
            } else {
                closeModal(); // Tutup loading modal jika tidak ada parameter ID
            }
        }

        // Fungsi fetch data dari Google Apps Script
        async function fetchDatabase() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getAll").then(r => r.json()).catch(() => null);
                if (response && response.status === 'success') {
                    DATA_REGISTRATIONS = response.data.pendaftaran || [];
                } else {
                    showModal('Gagal Memuat', 'Gagal terhubung ke database panitia.', 'error');
                }
            } catch (error) {
                console.error(error);
                showModal('Error Jaringan', 'Periksa koneksi internet Anda.', 'error');
            }
        }

        // --- MANAJEMEN UI & MODAL ---
        function toggleScaleModal(modalId, contentId, show) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if(!modal || !content) return;

            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => { content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
            } else {
                content.classList.remove('scale-100'); content.classList.add('scale-95');
                setTimeout(() => { modal.classList.add('hidden'); }, 200);
            }
        }

        function showModal(title, message, type = 'info', hideBtn = false, timeout = 3000) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerHTML = message;
            
            const icon = document.getElementById('modalIcon');
            if(type === 'success') icon.className = 'fas fa-check-circle text-5xl mb-3 text-green-500';
            else if (type === 'error') icon.className = 'fas fa-times-circle text-5xl mb-3 text-red-500';
            else icon.className = 'fas fa-info-circle text-5xl mb-3 text-orange-500';

            const btn = document.getElementById('btn-close-modal');
            hideBtn ? btn.classList.add('hidden') : btn.classList.remove('hidden');

            toggleScaleModal('customModal', 'modalContent', true);

            clearTimeout(globalModalTimer);
            if(timeout > 0) globalModalTimer = setTimeout(() => closeModal(), timeout);
        }

        function closeModal() {
            clearTimeout(globalModalTimer);
            toggleScaleModal('customModal', 'modalContent', false);
        }

        function openFormModal(modalId) { document.getElementById(modalId).classList.remove('hidden'); }
        function closeFormModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }

        // --- LOGIKA SCANNER QR CODE KAMERA ---
        function openScanner() {
            openFormModal('qrModal');
            document.getElementById('qr-status-text').innerText = "Meminta akses kamera...";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
            .then(() => {
                document.getElementById('qr-status-text').innerText = "Arahkan Kamera ke QR Code Peserta.";
            })
            .catch((err) => {
                document.getElementById('qr-status-text').innerText = "Gagal mengakses kamera. Izinkan penggunaan kamera browser Anda.";
                console.error("Camera access error:", err);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    closeFormModal('qrModal');
                    processScannedText(decodedText);
                }).catch((err) => console.error("Failed to stop scanner", err));
            }
        }
        
        function onScanFailure(error) { }

        function closeScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => closeFormModal('qrModal')).catch(() => closeFormModal('qrModal'));
            } else {
                closeFormModal('qrModal');
            }
        }

        function processScannedText(text) {
            let extractedId = text;
            if(text.includes('?id=')) extractedId = text.split('?id=')[1];
            else if(text.includes('id=')) extractedId = text.split('id=')[1];
            else if(text.includes('http')) extractedId = text.split('/').pop();
            
            extractedId = extractedId.trim().substring(0, 5).toUpperCase();
            document.getElementById('input-cek-id').value = extractedId;
            
            if (extractedId.length === 5) {
                tampilkanKartuKeHalaman(extractedId);
            } else {
                showModal('Gagal', 'Format QR Code tidak dikenali atau ID tidak lengkap.', 'error');
            }
        }


        // --- PENCARIAN PESERTA ---
        function cariPesertaManual() {
            const idInput = document.getElementById('input-cek-id').value.trim().toUpperCase();
            if(idInput.length !== 5) { 
                showModal('Format Salah', 'Harap masukkan persis 5 digit ID Peserta. Contoh: A001', 'error'); 
                return; 
            }
            // Ubah URL bar agar link bisa di-copy tanpa reload
            window.history.pushState({}, '', '?id=' + idInput);
            tampilkanKartuKeHalaman(idInput);
        }

        // --- FUNGSI TAMPILKAN KARTU LANGSUNG KE HALAMAN UTAMA ---
        function tampilkanKartuKeHalaman(idCari) {
            const idCariKapital = String(idCari).toUpperCase();
            
            // Cek peserta yang statusnya fix 'terdaftar' (disetujui)
            const peserta = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital && p.status === 'terdaftar');          
            
            if(peserta) {
                closeModal(); // Pastikan modal loading/error tertutup
                
                const shortName = abbreviateName(peserta.namaPeserta);
                const cleanFotoUrl = getCleanDriveImage(peserta.fotoUrl);
                const fotoElement = peserta.fotoUrl 
                    ? `<img src="${cleanFotoUrl}" class="w-24 h-32 object-cover rounded-xl border-[3px] border-white shadow-md bg-gray-50 flex-shrink-0" referrerpolicy="no-referrer" alt="Foto">` 
                    : `<div class="w-24 h-32 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-[10px] text-center rounded-xl bg-white shadow-sm flex-shrink-0">Foto Kosong</div>`;

                // Render Kartu ke tag <main> secara keseluruhan (Menghapus kotak pencarian)
                const mainContainer = document.querySelector('main');
                mainContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-[80vh] px-4 sm:px-6 lg:px-8 py-10 w-full">
                        <div class="w-full max-w-md mx-auto bg-white rounded-3xl overflow-hidden shadow-2xl border border-orange-200 font-sans relative mb-6">
                            
                            <div class="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-orange-200 to-transparent rounded-bl-full opacity-40 z-0 pointer-events-none"></div>
                            <div class="absolute bottom-0 left-0 w-32 h-32 bg-gradient-to-tr from-blue-100 to-transparent rounded-tr-full opacity-60 z-0 pointer-events-none"></div>
                            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03] z-0 pointer-events-none"></div>

                            <div class="bg-gradient-to-r from-orange-600 to-orange-400 px-5 py-4 flex items-center gap-4 relative z-10 shadow-sm">
                                <div class="h-16 flex-shrink-0 bg-white p-1 rounded-lg">
                                    <img src="https://i.ibb.co.com/Wvf6CP6Y/Cover-Lomba-2.png" class="h-full w-auto object-contain" alt="Logo">
                                </div>
                                <div class="text-left text-white flex-grow min-w-0">
                                    <h2 class="text-[15px] font-black uppercase tracking-wider leading-tight drop-shadow-md">Kartu Peserta Lomba</h2>
                                    <p class="text-[11px] font-semibold opacity-95 mt-0.5 uppercase tracking-wide leading-tight">Tingkat Kec. Sukamakmur<br>Tahun 2026</p>
                                </div>
                            </div>

                            <div class="p-6 flex gap-5 items-center relative z-10 border-b border-gray-100">
                                ${fotoElement}
                                <div class="flex flex-col justify-center flex-grow min-w-0">
                                    <h3 class="text-xl font-extrabold text-gray-900 leading-tight mb-2 truncate" title="${peserta.namaPeserta}">${shortName}</h3>
                                    <div class="inline-flex items-center bg-orange-50 text-orange-700 border border-orange-200 px-3 py-1.5 rounded-lg text-sm font-black tracking-widest shadow-sm w-max">
                                        <i class="fas fa-id-badge mr-2 opacity-70"></i> ${peserta.idPeserta}
                                    </div>
                                </div>
                            </div>

                            <div class="px-6 py-5 relative z-10 space-y-3 text-sm">
                                <div class="flex justify-between border-b border-gray-100 pb-2">
                                    <span class="font-bold text-gray-500 uppercase text-xs">NISN</span>
                                    <span class="font-mono font-bold text-gray-800">${peserta.nisn}</span>
                                </div>
                                <div class="flex flex-col border-b border-gray-100 pb-2">
                                    <span class="font-bold text-gray-500 uppercase text-xs mb-1">Asal Sekolah</span>
                                    <span class="font-bold text-gray-800 text-base leading-tight">${peserta.namaSekolah}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="font-bold text-gray-500 uppercase text-xs mb-1">Cabang Lomba</span>
                                    <span class="font-extrabold text-orange-600 text-base leading-tight">${peserta.lomba}</span>
                                </div>
                            </div>

                            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-between items-center relative z-10">
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Status Cek</span>
                                <span class="inline-flex items-center px-3 py-1 rounded-lg text-[10px] font-extrabold border bg-green-100 text-green-800 border-green-200 shadow-sm">
                                    <i class="fas fa-check-circle mr-1"></i> Disetujui
                                </span>
                            </div>
                        </div>

                        <div class="w-full max-w-md space-y-3">
                            <button onclick="window.print()" class="w-full bg-gray-800 text-white py-3.5 rounded-xl font-bold hover:bg-gray-900 transition flex justify-center items-center shadow-md">
                                <i class="fas fa-print mr-2"></i> Cetak / Simpan PDF
                            </button>
                            <button onclick="window.location.href='cek-peserta.html'" class="w-full bg-white border border-gray-300 text-gray-600 py-3.5 rounded-xl font-bold hover:bg-gray-50 transition flex justify-center items-center shadow-sm">
                                <i class="fas fa-search mr-2"></i> Cari Peserta Lain
                            </button>
                        </div>
                    </div>
                `;

            } else {
                // Jika ID tidak ada, tampilkan notifikasi di form pencarian
                const pesertaPending = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital);
                
                if (pesertaPending) {
                     const pesanPending = `Mohon maaf, pendaftaran dengan ID "${idCariKapital}" masih dalam proses verifikasi atau perlu perbaikan berkas. Silakan hubungi Operator Sekolah Anda.`;
                     showModal('Sedang Diproses', pesanPending, 'info', false, 5000);
                } else {
                     const pesanNotFound = `Peserta dengan ID "${idCariKapital}" tidak ditemukan dalam sistem. Pastikan 5 digit ID yang Anda ketik sudah benar.`;
                     showModal('Tidak Ditemukan', pesanNotFound, 'error', false, 5000);
                }
            }
        }

        // Helper Fungsi Singkat Nama (Hanya 2 kata depan, sisanya inisial)
        function abbreviateName(name) {
            let words = name.trim().split(/\s+/);
            if (words.length <= 2) return name;
            let result = words[0] + " " + words[1];
            for (let i = 2; i < words.length; i++) {
                result += " " + words[i].charAt(0).toUpperCase() + ".";
            }
            return result;
        }

        // Helper untuk API Thumbnail Drive
        function getCleanDriveImage(url) {
            if (!url) return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=|drive\.google\.com\/uc\?id=)([-\w]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`; 
            }
            return url;
        }
    </script>
</body>
</html>
