<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Peserta Lomba - Kecamatan Sukamakmur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: {
                            dark: '#c2410c', primary: '#f97316', secondary: '#fb923c',
                            accent: '#ffedd5', light: '#fff7ed'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        /* Animasi loading sederhana */
        .loader {
          border: 4px solid #f3f3f3;
          border-top: 4px solid #f97316;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col" onload="initApp()">

    <div id="main-container" class="flex-grow flex flex-col items-center justify-center p-4">
        
        <div id="loading-state" class="text-center py-10 flex flex-col items-center justify-center w-full">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Sedang memuat data peserta...</p>
        </div>

        <div id="error-state" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg border border-red-100 p-8 text-center mx-auto">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Data Tidak Ditemukan</h2>
            <p id="error-message" class="text-gray-600 mb-6 text-sm"></p>
            <a href="cek-peserta.html" class="inline-block bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-md">
                <i class="fas fa-search mr-2"></i> Coba Cari Lagi
            </a>
        </div>

        <div id="search-state" class="hidden w-full max-w-lg bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-orange-100 relative overflow-hidden mt-10">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-orange-400 z-20"></div>
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl mb-4">
                    <i class="fas fa-id-card-alt text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Cari Peserta</h2>
                <p class="text-gray-500 mt-1 text-sm">Masukkan 5 Digit ID Peserta.</p>
            </div>
            <div class="flex space-x-2">
                <input type="text" id="input-cek-id" maxlength="5" style="text-transform: uppercase;" class="flex-grow w-full appearance-none rounded-xl border-2 border-gray-200 px-4 py-3 text-lg tracking-widest font-mono text-center text-gray-900 focus:outline-none focus:ring-0 focus:border-orange-500 bg-gray-50" placeholder="A001">
                <button onclick="cariPesertaManual()" class="bg-gradient-to-r from-orange-500 to-orange-400 text-white font-bold px-6 rounded-xl shadow-md hover:opacity-90">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div id="card-container" class="hidden w-full max-w-md mx-auto my-4 transition-all duration-300">
            </div>
        
        <div id="card-actions" class="hidden w-full max-w-md mx-auto mt-4 mb-8 space-y-3 px-2">
            <button onclick="window.print()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900 transition flex justify-center items-center shadow-md">
                <i class="fas fa-print mr-2"></i> Cetak / Simpan PDF
            </button>
            <a href="https://gurubogor.github.io/lombasukamakmur/" class="w-full bg-white border border-gray-300 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-50 transition flex justify-center items-center shadow-sm block text-center">
                <i class="fas fa-home mr-2"></i> Kembali ke Beranda Utama
            </a>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgiaujeKcPpf2HQWHKZcICxsrFAlIvdgV4hq6EuGEIY40IaX14wu80BwftWIrr38YY/exec";

        let DATA_REGISTRATIONS = [];

        // Eksekusi utama saat halaman dimuat
        async function initApp() {
            // Cek apakah ada parameter ?id= di URL
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');

            // Tarik data dari server
            await fetchDatabase();

            if (idFromUrl) {
                // Jika ada ID di URL, langsung proses datanya
                prosesDataLangsung(idFromUrl);
            } else {
                // Jika tidak ada ID, tampilkan form pencarian biasa
                tampilkanPencarian();
            }
        }

        async function fetchDatabase() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getAll").then(r => r.json()).catch(() => null);
                if (response && response.status === 'success') {
                    DATA_REGISTRATIONS = response.data.pendaftaran || [];
                } else {
                    tampilkanError("Gagal terhubung ke server pendaftaran. Silakan muat ulang halaman.");
                }
            } catch (error) {
                console.error(error);
                tampilkanError("Terjadi kesalahan jaringan. Periksa koneksi internet Anda.");
            }
        }

        function cariPesertaManual() {
            const inputVal = document.getElementById('input-cek-id').value.trim();
            if(inputVal.length !== 5) {
                alert("Format ID salah. Harus 5 karakter.");
                return;
            }
            // Tambahkan parameter ke URL tanpa reload halaman (opsional, agar link bisa dicopy)
            window.history.pushState({}, '', '?id=' + inputVal.toUpperCase());
            
            // Kembalikan ke state loading sebentar
            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            
            setTimeout(() => {
                 prosesDataLangsung(inputVal);
            }, 500); // Simulasi loading agar transisi halus
        }

        function prosesDataLangsung(idCari) {
            document.getElementById('loading-state').classList.add('hidden');
            const idCariKapital = String(idCari).toUpperCase();
            
            // Cari data di array
            const peserta = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital && p.status === 'terdaftar');          
            
            if(peserta) {
                // Tampilkan Kartunya!
                renderKartuPeserta(peserta);
            } else {
                // Cek kalau pending/ditolak
                const pesertaPending = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital);
                
                if (pesertaPending) {
                    tampilkanError(`Pendaftaran dengan ID <b>${idCariKapital}</b> masih dalam proses verifikasi atau memerlukan perbaikan berkas. Silakan hubungi Operator Sekolah Anda.`);
                } else {
                    tampilkanError(`Peserta dengan ID <b>${idCariKapital}</b> tidak ditemukan dalam sistem kami.`);
                }
            }
        }

        function tampilkanError(pesan) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('card-container').classList.add('hidden');
            document.getElementById('card-actions').classList.add('hidden');
            
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').innerHTML = pesan;
        }

        function tampilkanPencarian() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('card-container').classList.add('hidden');
            document.getElementById('card-actions').classList.add('hidden');
            
            document.getElementById('search-state').classList.remove('hidden');
            
            // Listener untuk input manual
            document.getElementById('input-cek-id').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    cariPesertaManual();
                }
            });
        }

        // Helper Fungsi
        function abbreviateName(name) {
            let words = name.trim().split(/\s+/);
            if (words.length <= 2) return name;
            let result = words[0] + " " + words[1];
            for (let i = 2; i < words.length; i++) {
                result += " " + words[i].charAt(0).toUpperCase() + ".";
            }
            return result;
        }

        function getCleanDriveImage(url) {
            if (!url) return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=|drive\.google\.com\/uc\?id=)([-\w]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`; 
            }
            return url;
        }

        // FUNGSI RENDER TAMPILAN KARTU (Ditempel langsung ke halaman, bukan Modal)
        function renderKartuPeserta(reg) {
            const shortName = abbreviateName(reg.namaPeserta);
            const cleanFotoUrl = getCleanDriveImage(reg.fotoUrl);
            const fotoElement = reg.fotoUrl 
                ? `<img src="${cleanFotoUrl}" class="w-24 h-32 object-cover rounded-xl border-[3px] border-white shadow-md bg-gray-50 flex-shrink-0" referrerpolicy="no-referrer" alt="Foto">` 
                : `<div class="w-24 h-32 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-xs text-center rounded-xl bg-white shadow-sm flex-shrink-0">Foto Kosong</div>`;

            // QR Code Asli untuk ID Peserta (Bisa di-scan ulang oleh panitia)
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://gurubogor.github.io/cekdatapeserta/?id=${reg.idPeserta}&margin=0`;

            const htmlKartu = `
                <div class="bg-white rounded-3xl overflow-hidden shadow-2xl border border-orange-200 font-sans relative">
                    
                    <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-bl from-orange-200 to-transparent rounded-bl-full opacity-40 z-0 pointer-events-none"></div>
                    <div class="absolute bottom-0 left-0 w-40 h-40 bg-gradient-to-tr from-blue-100 to-transparent rounded-tr-full opacity-60 z-0 pointer-events-none"></div>
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03] z-0 pointer-events-none"></div>

                    <div class="bg-gradient-to-r from-orange-600 to-orange-400 px-5 py-4 flex items-center gap-4 relative z-10 shadow-sm">
                        <div class="h-16 flex-shrink-0 bg-white p-1 rounded-lg">
                            <img src="https://i.ibb.co.com/Wvf6CP6Y/Cover-Lomba-2.png" class="h-full w-auto object-contain" alt="Logo">
                        </div>
                        <div class="text-left text-white flex-grow">
                            <h2 class="text-[15px] font-black uppercase tracking-wider leading-tight drop-shadow-md">Kartu Peserta Lomba</h2>
                            <p class="text-xs font-semibold opacity-90 mt-0.5 uppercase tracking-wide">Tingkat Kec. Sukamakmur<br>Tahun 2026</p>
                        </div>
                    </div>

                    <div class="p-6 flex gap-5 items-center relative z-10 border-b border-gray-100">
                        ${fotoElement}
                        <div class="flex flex-col justify-center flex-grow min-w-0">
                            <h3 class="text-xl font-extrabold text-gray-900 leading-tight mb-2 truncate" title="${reg.namaPeserta}">${shortName}</h3>
                            <div class="inline-flex items-center bg-orange-50 text-orange-700 border border-orange-200 px-3 py-1.5 rounded-lg text-sm font-black tracking-widest shadow-sm w-max">
                                <i class="fas fa-id-badge mr-2 opacity-70"></i> ${reg.idPeserta}
                            </div>
                        </div>
                    </div>

                    <div class="px-6 py-5 relative z-10 space-y-3 text-sm">
                        <div class="flex justify-between border-b border-gray-100 pb-2">
                            <span class="font-bold text-gray-500 uppercase text-xs">NISN</span>
                            <span class="font-mono font-bold text-gray-800">${reg.nisn}</span>
                        </div>
                        <div class="flex flex-col border-b border-gray-100 pb-2">
                            <span class="font-bold text-gray-500 uppercase text-xs mb-1">Asal Sekolah</span>
                            <span class="font-bold text-gray-800 text-base leading-tight">${reg.namaSekolah}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-gray-500 uppercase text-xs mb-1">Cabang Lomba</span>
                            <span class="font-extrabold text-orange-600 text-base leading-tight">${reg.lomba}</span>
                        </div>
                    </div>

                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-between items-center relative z-10">
                        <div class="text-xs text-gray-500 font-medium">
                            <p class="font-bold text-green-600 mb-1"><i class="fas fa-check-circle"></i> Terverifikasi</p>
                            <p>Bawa kartu ini<br>saat daftar ulang.</p>
                        </div>
                        <img src="${qrUrl}" alt="QR Validasi" class="w-16 h-16 rounded border border-gray-300 p-1 bg-white shadow-sm">
                    </div>

                </div>
            `;

            // Tampilkan ke halaman
            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            
            const container = document.getElementById('card-container');
            container.innerHTML = htmlKartu;
            container.classList.remove('hidden');
            
            document.getElementById('card-actions').classList.remove('hidden');
        }
    </script>
</body>
</html>
