<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Peserta Lomba - Kecamatan Sukamakmur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: {
                            dark: '#c2410c', primary: '#f97316', secondary: '#fb923c',
                            accent: '#ffedd5', light: '#fff7ed'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        /* Animasi loading sederhana */
        .loader {
          border: 4px solid #f3f3f3;
          border-top: 4px solid #f97316;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        
        .scanner-line {
            width: 100%; height: 2px; background: #f97316; position: absolute; top: 0; left: 0;
            box-shadow: 0 0 10px #f97316, 0 0 20px #f97316; animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col" onload="initApp()">

    <div id="customModal" class="fixed inset-0 bg-black bg-opacity-50 z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-all scale-95 border border-orange-100 relative overflow-hidden" id="modalContent">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-orange-400"></div>
            <div class="text-center mb-4">
                <i id="modalIcon" class="fas fa-info-circle text-5xl mb-3 text-orange-500"></i>
                <h3 id="modalTitle" class="text-2xl font-extrabold text-gray-900">Informasi</h3>
            </div>
            <p id="modalMessage" class="text-center text-gray-600 mb-8 text-sm md:text-base">Pesan di sini.</p>
            <button id="btn-close-modal" onclick="closeModal()" class="w-full bg-gradient-to-r from-orange-500 to-orange-400 text-white py-3.5 rounded-xl hover:from-orange-600 hover:to-orange-500 font-bold transition shadow-lg shadow-orange-500/30">Tutup</button>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-95 z-[60] hidden flex flex-col items-center justify-center p-4">
        <h3 class="text-white text-lg font-bold mb-4 text-center">Arahkan Kamera ke QR Code Peserta</h3>
        <div id="reader" class="w-full max-w-sm rounded-xl overflow-hidden bg-black shadow-2xl shadow-orange-500/20 border-4 border-orange-500"></div>
        <p class="text-orange-300 mt-4 text-sm font-medium text-center px-4" id="qr-status-text">Meminta akses kamera...</p>
        <button onclick="closeScanner()" class="mt-8 bg-red-500 text-white px-8 py-3 rounded-full font-bold hover:bg-red-600 transition shadow-lg flex items-center">
            <i class="fas fa-times mr-2"></i> Batal / Tutup Kamera
        </button>
    </div>

    <div id="main-container" class="flex-grow flex flex-col items-center justify-center p-4 w-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-orange-50/50">
        
        <div id="loading-state" class="text-center py-10 flex flex-col items-center justify-center w-full">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Sedang memuat data peserta...</p>
        </div>

        <div id="error-state" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg border border-red-100 p-8 text-center mx-auto">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Data Tidak Ditemukan</h2>
            <p id="error-message" class="text-gray-600 mb-6 text-sm"></p>
            <button onclick="tampilkanPencarian()" class="inline-block bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-md w-full">
                <i class="fas fa-search mr-2"></i> Coba Cari Lagi
            </button>
        </div>

        <div id="search-state" class="hidden w-full max-w-lg bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-orange-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-orange-400 z-20"></div>
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl mb-4">
                    <i class="fas fa-id-card-alt text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Cari Peserta</h2>
                <p class="text-gray-500 mt-1 text-sm">Masukkan 5 Digit ID Peserta.</p>
            </div>
            <div class="flex space-x-2">
                <input type="text" id="input-cek-id" maxlength="5" style="text-transform: uppercase;" class="flex-grow w-full appearance-none rounded-xl border-2 border-gray-200 px-4 py-3 text-lg tracking-widest font-mono text-center text-gray-900 focus:outline-none focus:ring-0 focus:border-orange-500 bg-gray-50" placeholder="A001">
                <button onclick="openScanner()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-xl transition shadow-inner border border-gray-200 flex items-center justify-center" title="Scan QR Code dengan Kamera">
                    <i class="fas fa-qrcode text-xl"></i>
                </button>
                <button onclick="cariPesertaManual()" class="bg-gradient-to-r from-orange-500 to-orange-400 text-white font-bold px-6 rounded-xl shadow-md hover:opacity-90">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-4 text-center">Contoh: A001, B012, C105</p>
            <div class="mt-6 text-center border-t border-gray-100 pt-4">
                <a href="https://gurubogor.github.io/lombasukamakmur/" class="text-orange-500 text-sm font-bold hover:underline">
                    <i class="fas fa-home mr-1"></i> Kembali ke Beranda Utama
                </a>
            </div>
        </div>

        <div id="card-container" class="hidden w-full max-w-md mx-auto transition-all duration-300">
            </div>
        
        <div id="card-actions" class="hidden w-full max-w-md mx-auto mt-4 px-2">
            <button onclick="tampilkanPencarian()" class="w-full bg-red-50 text-red-600 border-2 border-red-200 py-3.5 rounded-xl font-extrabold hover:bg-red-500 hover:text-white hover:border-red-500 transition-all duration-300 flex justify-center items-center shadow-sm">
                <i class="fas fa-times-circle mr-2 text-lg"></i> Tutup & Kembali
            </button>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgiaujeKcPpf2HQWHKZcICxsrFAlIvdgV4hq6EuGEIY40IaX14wu80BwftWIrr38YY/exec";

        let DATA_REGISTRATIONS = [];
        let html5QrCode; // Instance untuk scanner QR
        let globalModalTimer;

        // Eksekusi utama saat halaman dimuat
        async function initApp() {
            // Cek apakah ada parameter ?id= di URL
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');

            // Tarik data dari server
            await fetchDatabase();

            if (idFromUrl) {
                // Jika ada ID di URL, langsung proses datanya
                document.getElementById('input-cek-id').value = idFromUrl;
                prosesDataLangsung(idFromUrl);
            } else {
                // Jika tidak ada ID, tampilkan form pencarian biasa
                tampilkanPencarian();
            }
            
            // Tambahkan listener untuk input enter
            document.getElementById('input-cek-id').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    cariPesertaManual();
                }
            });
        }

        async function fetchDatabase() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getAll").then(r => r.json()).catch(() => null);
                if (response && response.status === 'success') {
                    DATA_REGISTRATIONS = response.data.pendaftaran || [];
                } else {
                    tampilkanError("Gagal terhubung ke server pendaftaran. Silakan muat ulang halaman.");
                }
            } catch (error) {
                console.error(error);
                tampilkanError("Terjadi kesalahan jaringan. Periksa koneksi internet Anda.");
            }
        }

        // --- FUNGSI PENCARIAN MANUAL ---
        function cariPesertaManual() {
            const inputVal = document.getElementById('input-cek-id').value.trim();
            if(inputVal.length !== 5) {
                showModal('Format Salah', 'Harap masukkan persis 5 digit ID Peserta. Contoh: A001', 'error');
                return;
            }
            
            // Ubah URL bar agar link bisa di-copy tanpa reload
            window.history.pushState({}, '', '?id=' + inputVal.toUpperCase());
            
            // Kembalikan ke state loading sebentar
            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('card-container').classList.add('hidden');
            document.getElementById('card-actions').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            
            setTimeout(() => {
                 prosesDataLangsung(inputVal);
            }, 500); // Simulasi loading agar transisi halus
        }

        function prosesDataLangsung(idCari) {
            document.getElementById('loading-state').classList.add('hidden');
            const idCariKapital = String(idCari).toUpperCase();
            
            // Cari data di array
            const peserta = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital && p.status === 'terdaftar');          
            
            if(peserta) {
                // Tampilkan Kartunya!
                renderKartuPeserta(peserta);
            } else {
                // Cek kalau pending/ditolak
                const pesertaPending = DATA_REGISTRATIONS.find(p => String(p.idPeserta).toUpperCase() === idCariKapital);
                
                if (pesertaPending) {
                    tampilkanError(`Pendaftaran dengan ID <b class="text-orange-600">${idCariKapital}</b> masih dalam proses verifikasi atau memerlukan perbaikan berkas.<br><br>Silakan hubungi Operator Sekolah Anda.`);
                } else {
                    tampilkanError(`Peserta dengan ID <b class="text-red-600">${idCariKapital}</b> tidak ditemukan dalam sistem kami.`);
                }
            }
        }

        // --- STATE MANAGEMENT ---
        function tampilkanError(pesan) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('card-container').classList.add('hidden');
            document.getElementById('card-actions').classList.add('hidden');
            
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').innerHTML = pesan;
        }

        function tampilkanPencarian() {
            // Hapus parameter URL agar ketika tombol ditutup URL kembali bersih
            window.history.pushState({}, '', window.location.pathname);
            document.getElementById('input-cek-id').value = '';

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('card-container').classList.add('hidden');
            document.getElementById('card-actions').classList.add('hidden');
            
            document.getElementById('search-state').classList.remove('hidden');
        }

        // --- LOGIKA SCANNER QR CODE KAMERA ---
        function openFormModal(modalId) { document.getElementById(modalId).classList.remove('hidden'); }
        function closeFormModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }

        function openScanner() {
            openFormModal('qrModal');
            document.getElementById('qr-status-text').innerText = "Meminta akses kamera...";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            // Menjalankan dengan kamera belakang
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
            .then(() => {
                document.getElementById('qr-status-text').innerText = "Arahkan Kamera ke QR Code Peserta.";
            })
            .catch((err) => {
                document.getElementById('qr-status-text').innerText = "Gagal mengakses kamera. Izinkan penggunaan kamera browser Anda.";
                console.error("Camera access error:", err);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    closeFormModal('qrModal');
                    processScannedText(decodedText);
                }).catch((err) => console.error("Failed to stop scanner", err));
            }
        }
        
        function onScanFailure(error) { }

        function closeScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => closeFormModal('qrModal')).catch(() => closeFormModal('qrModal'));
            } else {
                closeFormModal('qrModal');
            }
        }

        function processScannedText(text) {
            let extractedId = text;
            if(text.includes('?id=')) extractedId = text.split('?id=')[1];
            else if(text.includes('id=')) extractedId = text.split('id=')[1];
            else if(text.includes('http')) extractedId = text.split('/').pop();
            
            extractedId = extractedId.trim().substring(0, 5).toUpperCase();
            document.getElementById('input-cek-id').value = extractedId;
            
            if (extractedId.length === 5) {
                // Trigger pencarian
                cariPesertaManual();
            } else {
                showModal('Gagal', 'Format QR Code tidak dikenali atau ID tidak lengkap.', 'error');
            }
        }

        // --- MANAJEMEN CUSTOM MODAL ---
        function toggleScaleModal(modalId, contentId, show) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if(!modal || !content) return;

            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => { content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
            } else {
                content.classList.remove('scale-100'); content.classList.add('scale-95');
                setTimeout(() => { modal.classList.add('hidden'); }, 200);
            }
        }

        function showModal(title, message, type = 'info', hideBtn = false, timeout = 3000) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerHTML = message;
            
            const icon = document.getElementById('modalIcon');
            if(type === 'success') icon.className = 'fas fa-check-circle text-5xl mb-3 text-green-500';
            else if (type === 'error') icon.className = 'fas fa-times-circle text-5xl mb-3 text-red-500';
            else icon.className = 'fas fa-info-circle text-5xl mb-3 text-orange-500';

            const btn = document.getElementById('btn-close-modal');
            hideBtn ? btn.classList.add('hidden') : btn.classList.remove('hidden');

            toggleScaleModal('customModal', 'modalContent', true);

            clearTimeout(globalModalTimer);
            if(timeout > 0) globalModalTimer = setTimeout(() => closeModal(), timeout);
        }

        function closeModal() {
            clearTimeout(globalModalTimer);
            toggleScaleModal('customModal', 'modalContent', false);
        }

        // --- HELPER ---
        function abbreviateName(name) {
            let words = name.trim().split(/\s+/);
            if (words.length <= 2) return name;
            let result = words[0] + " " + words[1];
            for (let i = 2; i < words.length; i++) {
                result += " " + words[i].charAt(0).toUpperCase() + ".";
            }
            return result;
        }

        function getCleanDriveImage(url) {
            if (!url) return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=|drive\.google\.com\/uc\?id=)([-\w]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`; 
            }
            return url;
        }

        // --- RENDER TAMPILAN KARTU ---
        function renderKartuPeserta(reg) {
            const shortName = abbreviateName(reg.namaPeserta);
            const cleanFotoUrl = getCleanDriveImage(reg.fotoUrl);
            const fotoElement = reg.fotoUrl 
                ? `<img src="${cleanFotoUrl}" class="w-24 h-32 object-cover rounded-xl border-[3px] border-white shadow-md bg-gray-50 flex-shrink-0" referrerpolicy="no-referrer" alt="Foto">` 
                : `<div class="w-24 h-32 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-[10px] text-center rounded-xl bg-white shadow-sm flex-shrink-0">Foto Kosong</div>`;

            // Update QR URL dynamically
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://gurubogor.github.io/cekdatapeserta/?id=${reg.idPeserta}&margin=0`;

            const htmlKartu = `
                <div class="bg-white rounded-3xl overflow-hidden shadow-2xl border border-orange-200 font-sans relative">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-orange-200 to-transparent rounded-bl-full opacity-40 z-0 pointer-events-none"></div>
                    <div class="absolute bottom-0 left-0 w-32 h-32 bg-gradient-to-tr from-blue-100 to-transparent rounded-tr-full opacity-60 z-0 pointer-events-none"></div>

                    <div class="bg-gradient-to-r from-orange-600 to-orange-400 px-[19px] py-4 flex items-center gap-4 relative z-10 shadow-sm">
                        <div class="h-16 md:h-20 max-w-[35%] flex-shrink-0 flex items-center justify-center">
                            <img src="https://i.ibb.co.com/Wvf6CP6Y/Cover-Lomba-2.png" class="h-full w-auto object-contain drop-shadow-md" alt="Logo">
                        </div>
                        <div class="text-left text-white flex-grow min-w-0 flex flex-col justify-center">
                            <h2 class="text-[13px] md:text-[15px] font-black uppercase tracking-wider leading-tight drop-shadow-md break-words w-full">Kartu Peserta Lomba</h2>
                            <p class="text-[10px] md:text-xs font-semibold opacity-95 mt-0.5 uppercase tracking-wide leading-tight w-full">Tingkat Kec. Sukamakmur<br>Tahun 2026</p>
                        </div>
                    </div>

                    <div class="p-6 flex gap-5 items-center relative z-10 border-b border-gray-100">
                        ${fotoElement}
                        <div class="flex flex-col justify-center flex-grow min-w-0">
                            <h3 class="text-xl font-extrabold text-gray-900 leading-tight mb-2 truncate" title="${reg.namaPeserta}">${shortName}</h3>
                            <div class="inline-flex items-center bg-orange-50 text-orange-700 border border-orange-200 px-3 py-1.5 rounded-lg text-sm font-black tracking-widest shadow-sm w-max">
                                <i class="fas fa-id-badge mr-2 opacity-70"></i> ${reg.idPeserta}
                            </div>
                        </div>
                    </div>

                    <div class="px-6 py-5 relative z-10 space-y-3 text-sm">
                        <div class="flex flex-col border-b border-gray-100 pb-3">
                            <span class="font-bold text-gray-500 uppercase text-[11px] mb-1 tracking-wide">Asal Sekolah</span>
                            <span class="font-bold text-gray-800 text-[15px] leading-tight">${reg.namaSekolah}</span>
                        </div>
                        <div class="flex flex-col pb-1">
                            <span class="font-bold text-gray-500 uppercase text-[11px] mb-1 tracking-wide">Cabang Lomba</span>
                            <span class="font-extrabold text-orange-600 text-[15px] leading-tight">${reg.lomba}</span>
                        </div>
                    </div>

                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-between items-center relative z-10">
                        <div class="text-xs text-gray-500 font-medium">
                            <p class="font-bold text-green-600 mb-1 flex items-center"><i class="fas fa-check-circle mr-1"></i> Terverifikasi</p>
                            <p>Tunjukkan kepada panitia<br>saat daftar ulang lomba.</p>
                        </div>
                        <img src="${qrUrl}" alt="QR Validasi" class="w-16 h-16 rounded-xl border border-gray-300 p-1 bg-white shadow-sm">
                    </div>
                </div>
            `;

            document.getElementById('search-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            
            const container = document.getElementById('card-container');
            container.innerHTML = htmlKartu;
            container.classList.remove('hidden');
            
            document.getElementById('card-actions').classList.remove('hidden');
        }
    </script>
</body>
</html>
